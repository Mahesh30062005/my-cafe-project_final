# ============================================================
# Nginx config for Velvet Bean React SPA
# ============================================================

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip compression ────────────────────────────────────
    gzip             on;
    gzip_comp_level  6;
    gzip_vary        on;
    gzip_min_length  1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Static asset caching ─────────────────────────────────
    # Vite includes content hashes in filenames, so we can cache
    # JS/CSS assets for a full year
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API proxy → Spring Boot backend ──────────────────────
    # 'backend' resolves via Docker Compose service name DNS
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback ─────────────────────────────────────────
    # All routes (except /api) return index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }
}
