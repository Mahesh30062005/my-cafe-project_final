# =========================================================
# Velvet Bean Cafe - Spring Boot Application Configuration
# Default profile: H2 in-memory (no external DB needed)
# To use Postgres later: run with -Dspring.profiles.active=prod
# =========================================================

# Load .env from backend root if present (safe to omit)\r\nspring.config.import=optional:file:.env[.properties]\r\n\r\n# --- Server ---
server.port=8080

# --- H2 Database (dev) ---
spring.datasource.url=jdbc:h2:mem:cafedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
# 'update' auto-creates/updates schema on startup; use 'validate' or migrations in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- Seed data (runs data.sql on every start if enabled) ---
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# --- Logging ---
logging.level.com.cafe=DEBUG
logging.level.org.springframework.web=INFO

# --- JWT ---
# Base64-encoded secret (replace in production)
jwt.secret=c2VjdXJlLWNvZGV4LWNhZmUtdG9rZW4tc2VjcmV0LWtleS0xMjM0NTY=
jwt.expiration-minutes=10

# --- Admin bootstrap (optional) ---
admin.seed.email=${ADMIN_SEED_EMAIL:}
admin.seed.password=${ADMIN_SEED_PASSWORD:}
admin.allowed-emails=${ADMIN_ALLOWED_EMAILS:}
admin.otp.expiration-minutes=5

# --- Mail (OTP delivery) ---
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Feedback notification email ---
feedback.notify.email=${FEEDBACK_NOTIFY_EMAIL:}

# --- Loyalty / Discounts ---
loyalty.premium.min-orders=5
loyalty.prime.min-orders=15
loyalty.premium.discount-percent=5
loyalty.prime.discount-percent=12

# --- Parcel ---
order.packaging.fee=20

# Date-based discount (ISO dates, inclusive)
discount.date.start=${DISCOUNT_DATE_START:}
discount.date.end=${DISCOUNT_DATE_END:}
discount.date.percent=${DISCOUNT_DATE_PERCENT:0}
discount.date.label=${DISCOUNT_DATE_LABEL:}

# Dessert combo: buy X get Y free
discount.combo.dessert.buy=3
discount.combo.dessert.free=1
discount.combo.dessert.category=DESSERTS


