# =========================================================
# Velvet Bean Cafe - Spring Boot Application Configuration
# Production profile: PostgreSQL
# Activate with: -Dspring.profiles.active=prod
# =========================================================

# --- PostgreSQL Database ---
# Values are injected from environment variables (or fall back to defaults)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cafedb}
spring.datasource.username=${DB_USER:cafe_user}
spring.datasource.password=${DB_PASS:cafe_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool tuning (HikariCP defaults are used)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Seed data ---
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=10

# --- Admin bootstrap (optional) ---
admin.seed.email=${ADMIN_SEED_EMAIL:}
admin.seed.password=${ADMIN_SEED_PASSWORD:}
admin.allowed-emails=${ADMIN_ALLOWED_EMAILS:}
admin.otp.expiration-minutes=5

# --- Mail (OTP delivery) ---
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Feedback notification email ---
feedback.notify.email=${FEEDBACK_NOTIFY_EMAIL:}

# --- Loyalty / Discounts ---
loyalty.premium.min-orders=5
loyalty.prime.min-orders=15
loyalty.premium.discount-percent=5
loyalty.prime.discount-percent=12

# --- Parcel ---
order.packaging.fee=20

# Date-based discount (ISO dates, inclusive)
discount.date.start=${DISCOUNT_DATE_START:}
discount.date.end=${DISCOUNT_DATE_END:}
discount.date.percent=${DISCOUNT_DATE_PERCENT:0}
discount.date.label=${DISCOUNT_DATE_LABEL:}

# Dessert combo: buy X get Y free
discount.combo.dessert.buy=3
discount.combo.dessert.free=1
discount.combo.dessert.category=DESSERTS
