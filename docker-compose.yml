version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: cafe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cafedb
      POSTGRES_USER: cafe_user
      POSTGRES_PASSWORD: cafe_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe_user -d cafedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafe_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cafedb
      DB_USER: cafe_user
      DB_PASS: cafe_secret
    ports:
      - "8080:8080"

volumes:
  postgres_data:
    name: cafe_postgres_data